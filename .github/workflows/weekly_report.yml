name: ETF Weekly Report

on:
  # Ogni sabato alle 09:00 CET (08:00 UTC in inverno, 07:00 UTC in estate)
  schedule:
    - cron: '0 8 * * 6'   # sabato 08:00 UTC = 09:00 CET
  # Pulsante per lancio manuale da GitHub
  workflow_dispatch:

jobs:
  build-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ETF Report
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python run.py --email

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: etf-report
          path: output/ETF_Report_*.html
          retention-days: 90

      - name: Commit report to repo
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add output/ data/
          git diff --staged --quiet || git commit -m "Report $(date +%Y-W%V)"
          git push
